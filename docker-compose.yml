services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/srv/tiny-provisioner
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: python -m app.worker
    env_file: .env
    volumes:
      - .:/srv/tiny-provisioner
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: provisioner
      POSTGRES_PASSWORD: provisioner
      POSTGRES_DB: provisioner
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
