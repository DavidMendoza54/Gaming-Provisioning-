services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env.production
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - internal
      - edge

  worker:
    build: .
    command: python -m app.worker
    env_file: .env.production
    environment:
      TRAEFIK_DYNAMIC_CONFIG_PATH: /var/lib/tiny-provisioner/traefik/apps.yml
      TRAEFIK_CERT_RESOLVER: letsencrypt
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - traefik-dynamic:/var/lib/tiny-provisioner/traefik
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - internal

  traefik:
    image: traefik:v3.5
    restart: unless-stopped
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/letsencrypt
      - traefik-dynamic:/etc/traefik/dynamic:ro
    networks:
      - edge
      - provisioned-apps

  tiny-python-http-app:
    build: ./provisioned_templates/tiny-python-http-app
    image: tiny-python-http-app:local
    profiles:
      - templates

volumes:
  postgres-data:
  redis-data:
  letsencrypt:
  traefik-dynamic:

networks:
  internal:
    internal: true
  edge:
    name: tiny-provisioner-edge
  provisioned-apps:
    name: tiny-provisioner-apps
