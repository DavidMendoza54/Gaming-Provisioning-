services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env.production
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    labels:
      traefik.enable: "true"
      traefik.docker.network: tiny-provisioner-edge
      traefik.http.routers.tiny-provisioner-api.rule: Host(`api.${APP_BASE_DOMAIN}`)
      traefik.http.routers.tiny-provisioner-api.entrypoints: websecure
      traefik.http.routers.tiny-provisioner-api.tls.certresolver: letsencrypt
      traefik.http.services.tiny-provisioner-api.loadbalancer.server.port: "8000"
    networks:
      - internal
      - edge

  worker:
    build: .
    command: python -m app.worker
    env_file: .env.production
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - internal

  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=tiny-provisioner-edge
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - edge
      - provisioned-apps

  tiny-python-http-app:
    build: ./provisioned_templates/tiny-python-http-app
    image: tiny-python-http-app:local
    profiles:
      - templates

volumes:
  postgres-data:
  redis-data:
  letsencrypt:

networks:
  internal:
    internal: true
  edge:
    name: tiny-provisioner-edge
  provisioned-apps:
    name: tiny-provisioner-apps

